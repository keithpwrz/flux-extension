<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flux</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        padding: 16px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .logo {
        width: 32px; height: 32px;
        background: #0050d8;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 18px;
        color: #fff;
        transform: rotate(14deg);
      }
      h1 { font-size: 18px; font-weight: 700; }
      .status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        margin-bottom: 14px;
        padding: 8px 10px;
        background: #16213e;
        border-radius: 6px;
      }
      .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #4ade80;
        box-shadow: 0 0 6px #4ade80;
      }
      .features {
        font-size: 12px;
        line-height: 1.6;
        margin-bottom: 14px;
        color: #aaa;
      }
      .features span { color: #4ade80; }
      .btn {
        display: block;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        margin-bottom: 8px;
      }
      .btn-primary {
        background: #0050d8;
        color: #fff;
      }
      .btn-primary:hover { background: #0044b8; }
      .btn-secondary {
        background: #16213e;
        color: #aaa;
      }
      .btn-secondary:hover { background: #1e2a4a; }
      .footer {
        font-size: 10px;
        color: #555;
        text-align: center;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">F</div>
      <h1>Flux</h1>
    </div>
    <div class="status">
      <div class="dot"></div>
      <span>Active — monitoring Roblox pages</span>
    </div>
    <div class="features">
      <span>✓</span> Server region detection<br />
      <span>✓</span> Live player counts (5s refresh)<br />
      <span>✓</span> Ping ratings &amp; direct join
    </div>
    <a class="btn btn-primary" href="https://www.roblox.com/games" target="_blank">
      Open Roblox Games
    </a>
    <a class="btn btn-secondary" href="https://github.com/keithpwrz/flux-extension" target="_blank">
      Report Bug / Feedback
    </a>
    <div class="footer">Flux v1.0.0 &middot; Free &amp; Open Source</div>
  </body>
</html>
